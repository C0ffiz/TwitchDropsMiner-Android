name: Build TwitchDropsMiner APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential git wget unzip zip curl ca-certificates \
            python3-dev python3-venv python3-pip pkg-config \
            libffi-dev libssl-dev libgl1-mesa-dev libegl1-mesa-dev libgles2-mesa-dev libglu1-mesa-dev \
            cmake ninja-build libtool automake autoconf \
            openjdk-17-jdk
          sudo update-alternatives --set java /usr/lib/jvm/java-17-openjdk-amd64/bin/java
          python3 -m pip install --upgrade pip setuptools wheel
        shell: bash

      - name: Cache Android SDK and NDK
        id: cache-android-sdk
        uses: actions/cache@v4
        with:
          path: ~/android-sdk
          key: android-sdk-v1-api34-ndk25.1.8937393

      - name: Setup Android SDK cmdline-tools
        if: steps.cache-android-sdk.outputs.cache-hit != 'true'
        run: |
          export ANDROID_HOME="${HOME}/android-sdk"
          export ANDROID_SDK_ROOT="${HOME}/android-sdk"
          mkdir -p "${ANDROID_HOME}"
          cd "${ANDROID_HOME}"
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-8512546_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip -d cmdline-tools-tmp
          mkdir -p cmdline-tools/latest
          mv cmdline-tools-tmp/cmdline-tools/* cmdline-tools/latest/ || true
          rm -rf cmdline-tools.zip cmdline-tools-tmp
          export PATH="${ANDROID_HOME}/cmdline-tools/latest/bin:${ANDROID_HOME}/platform-tools:${PATH}"
          yes 2>/dev/null | sdkmanager --sdk_root="${ANDROID_HOME}" --licenses || true
          sdkmanager --sdk_root="${ANDROID_HOME}" --install "platform-tools" "platforms;android-34" "build-tools;34.0.0" "ndk;25.1.8937393" "cmake;3.22.1"
          # Create legacy sdkmanager symlink for Buildozer
          mkdir -p "${ANDROID_HOME}/tools/bin"
          ln -sf "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager" "${ANDROID_HOME}/tools/bin/sdkmanager"
          ln -sf "${ANDROID_HOME}/cmdline-tools/latest/bin/avdmanager" "${ANDROID_HOME}/tools/bin/avdmanager"
        shell: bash

      - name: Set Android SDK environment variables
        run: |
          echo "ANDROID_HOME=${HOME}/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=${HOME}/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=${HOME}/android-sdk/ndk/25.1.8937393" >> $GITHUB_ENV
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          echo "${HOME}/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "${HOME}/android-sdk/platform-tools" >> $GITHUB_PATH
        shell: bash

      - name: Cache pip (shared across runs)
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt', '.github/workflows/build-android.yml') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Cache virtualenv
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-v1-${{ runner.os }}-${{ hashFiles('requirements.txt', '.github/workflows/build-android.yml') }}
          restore-keys: venv-v1-${{ runner.os }}-

      - name: Create and activate virtualenv
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install "buildozer>=1.5.0" "cython==0.29.37"
          pip install "python-for-android>=2023.9.0,<2025.0.0"
        shell: bash

      - name: Cache .buildozer platform artifacts
        id: cache-buildozer
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-v2-${{ runner.os }}-${{ hashFiles('buildozer.spec', 'requirements.txt') }}
          restore-keys: buildozer-v2-${{ runner.os }}-

      - name: Print environment (debug)
        run: |
          echo "ANDROID_HOME=${ANDROID_HOME}"
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64"
          java -version || true
          python -V
          .venv/bin/python -m pip freeze | sed -n '1,200p' || true
        shell: bash

      - name: Build clean previous state
        if: steps.cache-buildozer.outputs.cache-hit != 'true'
        run: |
          source .venv/bin/activate
          buildozer --version || true
          buildozer android clean || true
        shell: bash
        continue-on-error: true

      - name: Clone and patch python-for-android for Android 14
        run: |
          P4A_DIR="${HOME}/p4a"
          git clone --depth=1 --branch master https://github.com/kivy/python-for-android.git "${P4A_DIR}"
          source .venv/bin/activate
          python3 ci/patch_p4a_android14.py "${P4A_DIR}"
          echo "P4A_SOURCE_DIR=${P4A_DIR}" >> $GITHUB_ENV
        shell: bash

      - name: Build run Buildozer (debug)
        run: |
          set -x
          source .venv/bin/activate
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          export ANDROID_HOME="${HOME}/android-sdk"
          export ANDROID_SDK_ROOT="${HOME}/android-sdk"
          export ANDROID_NDK_HOME="${HOME}/android-sdk/ndk/25.1.8937393"
          # Inject SDK/NDK paths into the [app] section of buildozer.spec.
          # Done via an external script to avoid the bash-heredoc / YAML
          # literal-block-scalar incompatibility (a heredoc closing delimiter
          # at column 0 terminates the YAML run: block prematurely).
          python3 ci/inject_sdk_paths.py
          buildozer -v android debug 2>&1 | tee buildozer_output.log
        shell: bash
        timeout-minutes: 90

      - name: Collect combined logs
        if: always()
        run: |
          echo "==== tail buildozer_output.log ====" > combined_logs.txt
          if [ -f buildozer_output.log ]; then
            tail -n 2000 buildozer_output.log >> combined_logs.txt || true
          fi
          if [ -d .buildozer ]; then
            find .buildozer -type f \( -iname "*.log" -o -iname "*.txt" -o -iname "*.out" \) -print0 | while IFS= read -r -d '' f; do
              echo "==== FILE: $f ====" >> combined_logs.txt
              sed -n '1,500p' "$f" >> combined_logs.txt || true
              echo >> combined_logs.txt
            done
          fi
          echo "==== Listing possible outputs ====" >> combined_logs.txt
          ls -la bin || true >> combined_logs.txt 2>&1
          for d in .buildozer/android/platform/build-* ; do
            if [ -d "$d" ]; then
              echo "==== DIR: $d ====" >> combined_logs.txt
              ls -la "$d" || true >> combined_logs.txt 2>&1
              ls -la "$d"/outputs || true >> combined_logs.txt 2>&1
            fi
          done || true
          zip -r build_debug_combined.zip combined_logs.txt || true
        shell: bash

      - name: Upload combined build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-debug-combined
          path: build_debug_combined.zip

      - name: Find and copy APKs into bin/
        if: always()
        run: |
          set -euo pipefail
          mkdir -p bin
          echo "Searching for APKs..."
          mapfile -t apks < <(find . -type f -name "*.apk" -print)
          if [ ${#apks[@]} -eq 0 ]; then
            echo "No APK files found to copy."
          else
            i=0
            for p in "${apks[@]}"; do
              i=$((i+1))
              fn=$(basename "$p")
              cp "$p" "bin/${i}_${fn}"
              echo "Copied: $p -> bin/${i}_${fn}"
            done
            echo "Final bin/ contents:"
            ls -la bin || true
          fi
        shell: bash

      - name: Upload APK (if created)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: |
            bin/*.apk
            ./.buildozer/android/platform/build-*/outputs/**/*.apk
            ./.buildozer/android/platform/build-*/outputs/apk/**/*.apk
          if-no-files-found: warn

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: TwitchDropsMiner Android ${{ github.ref_name }}
          body: |
            ## TwitchDropsMiner Android ${{ github.ref_name }}

            ### Install
            1. Download the APK below.
            2. Enable **Install from unknown sources** on your Android device.
            3. Open the APK and install.
            4. Launch the app, tap **Login with Twitch**, enter the code at https://www.twitch.tv/activate.

            ### Requirements
            - Android 7.0+ (API 24)
            - arm64-v8a device (64-bit)

            ### What's included
            - Automatic drop mining with foreground service
            - OAuth device code login (no password)
            - Inventory, Channels, and Logs screens
            - Auto-claim toggle
          files: bin/*.apk
          fail_on_unmatched_files: false
